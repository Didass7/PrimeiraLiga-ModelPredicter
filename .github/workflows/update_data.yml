name: Pipeline de Atualização de Dados (Semanal)

on:
  schedule:
    # Corre todas as segundas e terças-feiras às 08:00 UTC (dias típicos pós-jornada)
    - cron: '0 8 * * 1,2'
  workflow_dispatch: # Permite-te iniciar o pipeline manualmente no browser sempre que quiseres

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      # Permissões necessárias para gravar as atualizações de volta no repositório
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Otimiza o build fazendo cache das dependências do pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run ETL Pipeline
        run: python pipeline/run_all.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-update: integração de dados semanais"
          file_pattern: "Datasets/**"
